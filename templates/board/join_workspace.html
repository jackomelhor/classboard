{% extends 'base.html' %}
{% block title %}Entrar em workspace{% endblock %}
{% block content %}
<section class="form-card narrow-card">
    <h1>Entrar em um workspace</h1>
    <p class="muted">Peça o código ao owner ou admin da turma e entre sem precisar de pagamento.</p>
    <form method="post" class="styled-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button button-primary">Entrar com código</button>
    </form>
</section>
{% endblock %}
